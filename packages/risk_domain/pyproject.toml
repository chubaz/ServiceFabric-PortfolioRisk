[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "risk-domain"
version = "0.1.0"
description = "Immutable portfolio-risk domain contracts."
requires-python = ">=3.11,<3.12"
dependencies = ["pydantic>=2,<3"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
