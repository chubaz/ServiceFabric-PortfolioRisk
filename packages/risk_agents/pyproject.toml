[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "risk-agents"
version = "0.1.0"
description = "Day 0 portfolio-risk agent role and provider contracts."
requires-python = ">=3.11,<3.12"
dependencies = ["pydantic>=2,<3", "risk-capabilities==0.1.0", "risk-domain==0.1.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
