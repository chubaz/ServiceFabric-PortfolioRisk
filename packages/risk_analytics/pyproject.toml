[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "risk-analytics"
version = "0.1.0"
description = "Deterministic and explainable portfolio-risk analytics."
requires-python = ">=3.11,<3.12"
dependencies = ["pydantic>=2,<3", "risk-domain==0.1.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
