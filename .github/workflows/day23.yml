name: day23

on:
  push:
    branches: [integration/day2-3]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install locked Day 1 environment
        run: python -m pip install --require-hashes -r requirements/day1.lock
      - name: Day 0 regression gate
        run: |
          make verify-day0
      - name: Day 1 regression gate
        run: |
          make verify-day1
      - name: Part 1 verification
        run: make verify-d23-phase1
      - name: Currently available Part 2 tests
        run: |
          make test-d23-monitoring-core
          make test-d23-monitoring-experience
          make test-d23-part2-integration
          make test-d23-part2-journeys
      - name: Current lifecycle verification
        run: make verify-d23-current
      - name: Build Part 2 demo after completion
        if: ${{ hashFiles('config/agent/day23/status.json') != '' }}
        run: |
          if [ "$(python -c 'import json; print(json.load(open("config/agent/day23/status.json"))["part_2"])')" = "complete" ]; then
            make demo-d23-part2
          else
            echo "Part 2 is not complete; demo is deferred"
          fi
      # The loopback process-host smoke is a local acceptance gate. CI does not
      # execute it or claim its evidence.
      - name: Validate whitespace
        run: git diff --check
