name: Day 0

on:
  push:
    branches: [integration/day0]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Day 0 dependencies
        run: python -m pip install --require-hashes -r requirements/day0.lock
      - name: Verify overlay boundaries
        run: PYTHONPATH="$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/packages" python -m pytest tests/architecture -q
      - name: Verify available Day 0 tests
        run: |
          for directory in tests/contracts tests/domain tests/planning tests/data tests/capabilities tests/agents tests/application tests/integration tests/journeys; do
            if [ -d "$directory" ]; then
              PYTHONPATH="$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/packages" python -m pytest "$directory" -q
            fi
          done
      - name: Check patch formatting
        run: git diff --check HEAD^ HEAD
